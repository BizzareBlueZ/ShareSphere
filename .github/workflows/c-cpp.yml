name: C/C++ CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: 6.6.0

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_PREFIX_PATH="$Qt6_DIR"

      - name: Build
        run: cmake --build build
      - name: make
        run: make
      - name: make check
        run: make check
      - name: make distcheck
        run: make distcheck
